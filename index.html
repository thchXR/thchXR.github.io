<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thchXR's Blog</title>
  
  <!-- 加载库 -->
  <!-- KaTeX -->
  <link rel="stylesheet" 
        href="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.css" 
        integrity="sha384-irXK0JiCGinqGL+slwVklbhJetrjczNwaP2lANewD8lKAs9n61SbQ3As28iSqXUE" 
        crossorigin="anonymous">
  <script defer 
          src="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.js" 
          integrity="sha384-m/s9umSlhJbqEdA/j7pQVdGCMx2fHf7GXtgCVhNGOwLuu+1qJQES5AzIE8pn3nKQ" 
          crossorigin="anonymous"></script>
  <script defer 
          src="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/contrib/auto-render.min.js" 
          integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" 
          crossorigin="anonymous"></script>
  <script defer src="/js/katex-render.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.css">
  <script src="js/load.js"></script>

  <!-- 加载样式表 之后可以添加切换功能 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>thchXR's Blog</h1>
      <p>数学与计算机笔记</p>
    </div>
  </header>

  <main class="container">
    <!-- 文章列表页面 -->
    <section id="list-page">
      <h2>Newest posts</h2>
      <ul id="post-list" class="post-list"></ul>
    </section>

    <!-- TODO: 后续把详情做成单独的页面html -->
    <!-- 文章详情页面 -->
    <section id="post-page" class="post-page" style="display: none;">
      <button id="back-button" class="back-btn">← 返回文章列表</button>
      <article id="post-content" class="post-content"></article>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 thchXR's Blog | powered by Markdown</p>
    </div>
  </footer>

</body>
</html>
