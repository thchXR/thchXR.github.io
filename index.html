  <!-- 加载库 -->
  <!-- KaTeX -->

        href="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.css"

          crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.css">

  <link rel="stylesheet" href="css/style.css">

<body>
  <header>
    <div class="container">
      <h1>thchXR's Blog</h1>
      <p>我的数学与计算机笔记</p>

      <div class="header-links">
        <a href="https://github.com/thchXR" 
           target="_blank" 
           rel="noopener noreferrer"
           class="social-link" 
           title="GitHub">
          <img src="https://github.githubassets.com/favicons/favicon.png" 
            alt="GitHub" 
            width="24" 
            height="24">
          <span>GitHub</span>
        </a>

        <a href="https://space.bilibili.com/129832609" 
           target="_blank" 
           rel="noopener noreferrer"
           class="social-link" 
           title="bilibili">
          <img src="https://i0.hdslb.com/bfs/static/jinkela/long/images/favicon.ico" 
            alt="bilibili" 
            width="24" 
            height="24">
          <span>bilibili</span>
        </a>

        <a href="https://steamcommunity.com/profiles/76561199041942397/" 
           target="_blank" 
           rel="noopener noreferrer"
           class="social-link" 
           title="Steam">
          <img src="https://store.steampowered.com/favicon.ico" 
            alt="Steam" 
            width="24" 
            height="24">
          <span>Steam</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- 文章列表页面 -->
    <section id="list-page">
      <h2>Newest posts</h2>
      <ul id="post-list" class="post-list"></ul>
    </section>

    <!-- TODO: 后续把详情做成单独的页面html -->
    <!-- 文章详情页面 -->
    <section id="post-page" class="post-page" style="display: none;">
      <button id="back-button" class="back-btn">← 返回文章列表</button>
      <article id="post-content" class="post-content"></article>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 thchXR's Blog | powered by Markdown</p>
    </div>
  </footer>
